{% extends 'base.html' %}
{% block title %}Results — Voting App{% endblock %}
{% block content %}
<section class="container py-6">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
    <div>
      <h2 class="mb-2">Live results</h2>
      <p class="text-muted mb-1">This page refreshes automatically every 12 seconds.</p>
      <small id="lastUpdated" class="text-muted">Last updated: —</small>
    </div>
    <a class="btn btn-primary" href="/vote/">Cast a vote</a>
  </div>
  <div id="results"></div>
</section>
{% endblock %}
{% block page_js %}
<script>window.pageInit && window.pageInit('results')</script>
{% endblock %}
